memory_type: entities
description: |
  Entity memory — ONE card per distinct real-world entity.
  Managed as Wikipedia-style pages (Zettelkasten method) with relative-path
  links to events, resources, and other entities.

  Use for: people, organizations, projects, products, systems, places.

  CRITICAL RULES:
  - ONE entity = ONE card. Same person or thing referenced by multiple
    names still gets a SINGLE card, with all known names listed in the
    card's "## Aliases" section.
  - Before creating a new entity card, scan the pre-fetched overview and
    search results. If any existing card refers to the SAME real-world
    entity (match by canonical name, display name, or listed alias),
    EDIT that existing card instead of creating a new one.
  - The entity's canonical name is the lowercase_underscore form of its
    most formal full name. Prefer "farih_akmal_haqiqi" over "akmal",
    "gamatecha_workspace" over "gamatecha", "model_context_protocol" over
    "mcp". If you only know the short form, use it — but record the
    formal name in display/content when you learn it.
  - Never split an entity into topical sub-cards. "gamatecha_workspace",
    "gamatecha_metrics", and "gamatecha_roadmap" about the same
    organization belong in ONE card, with sections inside the content.
  - Truly distinct entities that share a name substring are DIFFERENT
    cards. "akmal" (Farih Akmal Haqiqi) and "abelakmal" (a separate
    contributor) must stay separate — having similar names is not
    evidence of being the same person.
directory: "viking://user/{{ user_space }}/memories/entities"
filename_template: "{{ category }}/{{ name }}.md"
enabled: true

fields:
  - name: category
    type: string
    description: |
      - Top-level category grouping for this entity. Use one of:
        people, organizations, projects, products, systems, places, concepts.
      - Lowercase with underscores, max 3 words.
    merge_op: immutable

  - name: name
    type: string
    description: |
      # Canonical name
      The stable identifier used as the filename. Must be the lowercase
      underscore form of the entity's most formal name. Never include
      dates, version suffixes, or sub-topic markers.

      ### Good
      - farih_akmal_haqiqi
      - gamatecha_workspace
      - model_context_protocol
      - cat_ist

      ### Bad
      - akmal                          // nickname, prefer full formal name
      - gamatecha_metrics              // sub-topic, belongs inside gamatecha_workspace
      - cat_ist_2026                   // includes a date/version
      - farih_akmal_haqiqi_details     // too long, no sub-card split
    merge_op: immutable

  - name: content
    type: string
    description: |
      # Content
      Markdown content describing the entity. Structure:

          # <display name>

          <1-2 sentence summary: what this entity is, role, key context>

          ## Key Facts
          - <bullet list of important attributes, dates, affiliations>

          ## Aliases
          - `akmal`
          - `Farih Akmal`
          - `<any other known names>`

          ## Related
          - [sibling_entity](sibling_name.md) — same category
          - [other_category_entity](../other_category/other_name.md) — different category
          - [event_name](../../events/<YYYY-MM-DD>_<event_name>.md) — participation

      Rules:
      - MAINTAIN the "## Aliases" section. Every time you see a new name
        referring to this entity, append it there. Never delete entries.
      - Entity files live at `entities/<category>/<name>.md`. Compute
        relative paths from THAT location:
        - Same-category sibling: `<other_name>.md`
        - Different category:    `../<other_category>/<other_name>.md`
        - Event reference:       `../../events/<YYYY-MM-DD>_<event_name>.md`
      - If content grows long, expand inline — do NOT split into multiple
        cards.
      - When editing, preserve existing sections. Add new facts under
        "Key Facts" or create a new dated section.
    merge_op: patch
