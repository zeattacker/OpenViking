memory_type: episodes
description: |
  # Guidelines
  - Session-level narrative summaries capturing the full conversation flow.
  - Generated as a separate post-extraction step, not inside the ReAct loop.
  - Episodes capture: what was discussed, decisions made, entities involved, and unresolved items.
  - Each episode summarizes ONE session commit (archive cycle).
  - Do NOT split a single session into multiple episodes.
directory: "viking://user/{{ user_space }}/memories/episodes"
# Uses actual schema fields (session_time, episode_title) rather than the
# previously-broken {{ date }}/{{ title_slug }} which weren't defined in
# `fields` below. Jinja2's DebugUndefined kept them as literal text and
# produced files named `{{ date }}_{{ title_slug }}.md` on disk.
# Episodes are normally generated by episode_indexer as a post-extraction
# step — SessionExtractContextProvider.get_memory_schemas excludes
# "episodes" from the extractor schema, so this template is a defensive
# fallback for custom deployments that re-enable direct episode extraction.
filename_template: "{{ session_time }}_{{ episode_title }}.md"
enabled: true
operation_mode: "add_only"

fields:
  - name: episode_title
    type: string
    description: |
      Descriptive title for the episode, summarizing the main topic.
      Example: "Database Migration Planning Session"
    merge_op: immutable

  - name: session_id
    type: string
    description: |
      Original session identifier (first 12 chars of UUID).
    merge_op: immutable

  - name: session_time
    type: string
    description: |
      Session timestamp in YYYYMMDDTHHMMSS format.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Full episode markdown content with structured sections:
      Summary, Key Topics, Decisions & Outcomes, Entities Mentioned, Unresolved Items.
    merge_op: patch
